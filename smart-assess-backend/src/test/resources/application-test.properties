# Test Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Test-specific properties
spring.security.enabled=true
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080

# Logging
logging.level.com.example.smart_assess=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Disable some features for testing
spring.mail.test-connection=false
app.ai-service.url=http://localhost:8000
app.frontend.url=http://localhost:5173

# JWT Test Configuration
app.jwt.secret=testSecretKeyForTestingOnly123456789012345678901234567890
app.jwt.expiration=86400000

# File upload test configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
