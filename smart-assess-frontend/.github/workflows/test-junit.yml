name: Tests with JUnit Reports

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run unit tests with JUnit
      run: npm run test:junit
      
    - name: Upload JUnit test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: junit-unit-tests
        path: test-results/junit.xml
        
    - name: Publish Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: Unit Tests
        path: test-results/junit.xml
        reporter: java-junit
        fail-on-error: true

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
      
    - name: Run E2E tests with JUnit
      run: npm run test:e2e:junit
      
    - name: Upload E2E JUnit test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: junit-e2e-tests
        path: test-results/e2e-junit.xml
        
    - name: Publish E2E Test Report
      uses: dorny/test-reporter@v1
      if: success() || failure()
      with:
        name: E2E Tests
        path: test-results/e2e-junit.xml
        reporter: java-junit
        fail-on-error: true

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run tests with coverage
      run: npm run test:coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create test summary
      run: |
        echo "# 🧪 Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📊 Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "junit-unit-tests/junit.xml" ]; then
          echo "### ✅ Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "- JUnit Report: Available" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ -f "junit-e2e-tests/e2e-junit.xml" ]; then
          echo "### 🎭 E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "- JUnit Report: Available" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## 📁 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Unit Test JUnit: Download from artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- E2E Test JUnit: Download from artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Coverage Report: Download from artifacts" >> $GITHUB_STEP_SUMMARY
